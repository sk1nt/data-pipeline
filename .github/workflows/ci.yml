name: CI

on:
  push:
    branches: [main, master, feature/v2-sweep-system]
  pull_request:
    branches: [main, master, feature/v2-sweep-system]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install minimal deps for contract check
        run: pip install pydantic

      - name: Verify Redis contracts
        run: python scripts/verify_contracts.py

      - name: Sweep stubs import cleanly
        run: |
          python -c "from src._moved_notice import moved_import"
          python sweep_runner.py 2>/dev/null || test $? -eq 2